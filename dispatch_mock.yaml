server: "http://127.0.0.1:8000"

runtime:
  interval: 3
  max_workers: 4
  max_running_projects: 2
  max_project_workers: 4
  healthcheck_timeout: 2
  worker_healthcheck: "startup_only"
  prompt_group: "mock"

tasks:
  bootstrap:
    timeout: 9
    conclude_timeout: 5
  reason:
    timeout: 5
    max_intents: 3
  explore:
    timeout: 9
    conclude_timeout: 5
  verify:
    timeout: 15
    conclude_timeout: 5
    # demo auto-fire (UI shows "auto fire" when no pending approvals)
    require_fire_approval: false
    force_harness: true
    max_rounds: 2
    allow_model_instantiate: false

container:
  image: "ghcr.io/oritera/cairn-worker-container:latest"
  network_mode: "host"
  completed_action: "stop"
  codebase_mount_path: "/workspace/codebase"
  cap_add:
    - "NET_RAW"
    - "NET_ADMIN"
  verify:
    network_mode: "host"

common_env:
  TSEC_BASE_URL: "http://<SERVER_HOST>/api"
  TSEC_AGENT_TOKEN: "common-agent-token"

workers:
  - name: "mock-observer-1"
    type: "mock"
    task_types: [reason, explore, bootstrap, verify]
    capabilities: [static_fs, live_http]
    max_running: 1
    priority: 0
    env:
      MOCK_HEALTHCHECK: '{"delay":[0,2],"outcomes":{"ok":0.9,"fail":0.1}}'
      MOCK_BOOTSTRAP: '{"delay":[5,10],"outcomes":{"complete":0.0,"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_BOOTSTRAP_CONCLUDE: '{"delay":[2,6],"outcomes":{"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_REASON: '{"delay":[2,6],"outcomes":{"complete":0.1,"intent":0.4,"noop":0.1,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_EXPLORE_EXECUTE: '{"delay":[5,10],"outcomes":{"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_EXPLORE_CONCLUDE: '{"delay":[2,6],"outcomes":{"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_VERIFY_EXECUTE: '{"delay":[1,3],"outcomes":{"triggered":0.7,"refuted":0.3,"rejected":0.0,"invalid_json":0.0,"invalid_payload":0.0,"command_fail":0.0}}'
      MOCK_VERIFY_CONCLUDE: '{"delay":[1,2],"outcomes":{"triggered":0.7,"refuted":0.3,"rejected":0.0,"invalid_json":0.0,"invalid_payload":0.0,"command_fail":0.0}}'

  - name: "mock-observer-2"
    type: "mock"
    task_types: [reason, explore, bootstrap, verify]
    capabilities: [static_fs, live_http]
    max_running: 1
    priority: 0
    env:
      MOCK_HEALTHCHECK: '{"delay":[0,2],"outcomes":{"ok":0.9,"fail":0.1}}'
      MOCK_BOOTSTRAP: '{"delay":[5,10],"outcomes":{"complete":0.0,"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_BOOTSTRAP_CONCLUDE: '{"delay":[2,6],"outcomes":{"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_REASON: '{"delay":[2,6],"outcomes":{"complete":0.1,"intent":0.4,"noop":0.1,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_EXPLORE_EXECUTE: '{"delay":[5,10],"outcomes":{"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_EXPLORE_CONCLUDE: '{"delay":[2,6],"outcomes":{"fact":0.6,"rejected":0.1,"invalid_json":0.1,"invalid_payload":0.1,"command_fail":0.1}}'
      MOCK_VERIFY_EXECUTE: '{"delay":[1,3],"outcomes":{"triggered":0.7,"refuted":0.3,"rejected":0.0,"invalid_json":0.0,"invalid_payload":0.0,"command_fail":0.0}}'
      MOCK_VERIFY_CONCLUDE: '{"delay":[1,2],"outcomes":{"triggered":0.7,"refuted":0.3,"rejected":0.0,"invalid_json":0.0,"invalid_payload":0.0,"command_fail":0.0}}'
